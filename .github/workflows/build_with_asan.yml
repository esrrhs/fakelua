name: BuildWithASAN

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v1


          
      - name: Setup Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 liblua5.4-dev

      - name: Setup TCC
        run: |
          git clone https://github.com/TinyCC/tinycc.git
          cd tinycc
          ./configure --extra-cflags="-fPIC"
          make -j2
          sudo make install
          cd ..
          
      - name: Build with asan
        run: |
          set -x
          rm build -rf
          mkdir build
          cd build
          export ASAN_OPTIONS=detect_leaks=0
          cmake -DUSE_ASAN=ON ..
          make -j2
          cd bin && ./unit_tests --gtest_filter='-*DISABLED*' && cd ..
          ./bin/bench_mark
          ./bin/flua
