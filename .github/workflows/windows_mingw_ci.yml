name: BuildWithWindows

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-lua

      - name: Build and test
        shell: msys2 {0}
        run: |
          set -eux
          rm -rf build
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          # Show what's in build/bin before copying DLLs.
          ls -la build/bin/
          # Copy all MinGW runtime DLL dependencies to build/bin so that
          # the Windows loader can find them when spawning native processes.
          ldd build/bin/unit_tests.exe build/bin/libfakelua.dll \
              build/bin/bench_mark.exe build/bin/flua.exe 2>/dev/null \
            | grep '/mingw64/' | awk '{print $3}' | sort -u \
            | xargs -I{} cp -f {} build/bin/
          # Show directory again after copying to confirm DLLs are present.
          ls -la build/bin/
          # Run tests from build/bin so the Windows DLL search path finds them.
          cd build/bin
          ./unit_tests.exe
          ./bench_mark.exe
          ./flua.exe
