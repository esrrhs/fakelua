name: BuildWithWindows

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-lua

      - name: Build
        shell: msys2 {0}
        run: |
          set -eux
          rm -rf build
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          ls -la build/bin/
          # Copy all MinGW runtime DLL dependencies into build/bin so that
          # the Windows loader can find them when running from that directory.
          ldd build/bin/unit_tests.exe build/bin/libfakelua.dll \
              build/bin/bench_mark.exe build/bin/flua.exe 2>/dev/null \
            | grep '/mingw64/' | awk '{print $3}' | sort -u \
            | xargs -I{} cp -f {} build/bin/ || true
          ls -la build/bin/
          # Add the MinGW64 bin directory (in Windows format) to the runner's
          # PATH so that subsequent steps' Windows processes can find the DLLs.
          echo "$(cygpath -w /mingw64/bin)" >> "$GITHUB_PATH"

      - name: Test
        shell: cmd
        run: |
          cd build\bin
          unit_tests.exe
          exit /b %errorlevel%
