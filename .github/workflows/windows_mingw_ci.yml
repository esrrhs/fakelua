name: BuildWithWindows

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-lua

      - name: Build and test
        shell: msys2 {0}
        run: |
          set -eux
          rm -rf build
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          # Show what's in build/bin to diagnose missing DLLs.
          ls -la build/bin/
          # Run unit tests directly from build/bin so that Windows DLL search
          # finds all MinGW runtime DLLs that are co-located in that directory.
          cd build/bin
          ./unit_tests.exe
          ./bench_mark.exe
          ./flua.exe
