name: BuildWithWindows

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-lua

      - name: Build
        shell: msys2 {0}
        run: |
          set -eux
          rm -rf build
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          echo "=== Copying MinGW runtime DLLs ==="
          ldd build/bin/unit_tests.exe build/bin/libfakelua.dll build/bin/libtcc.dll 2>/dev/null \
            | grep '/mingw64/' | awk '{print $3}' | sort -u \
            | xargs -I{} cp -fv {} build/bin/ || true

      - name: Run Tests
        shell: cmd
        run: |
          set PATH=%CD%\build\bin;C:\msys64\mingw64\bin;%PATH%
          cd build\bin
          unit_tests.exe
