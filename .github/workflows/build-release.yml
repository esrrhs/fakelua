name: BuildRelease

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v1

      - name: Setup GCC
        uses: pkgxdev/setup@v1
        with:
          +: gcc@13

      - name: Setup Lua
        run: |
          wget https://www.lua.org/ftp/lua-5.4.7.tar.gz
          tar -xf lua-5.4.7.tar.gz
          cd lua-5.4.7
          make linux
          sudo make install
          cd ..
          
      - name: Build
        run: |
          set -x
          rm build -rf
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j8
          ctest -V
          ./bin/bench_mark
          ./bin/flua
