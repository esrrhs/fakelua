name: BuildRelease

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v1



      - name: Setup Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 liblua5.4-dev
          
      - name: Build
        run: |
          set -x
          rm build -rf
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j8
          ctest -V
          ./bin/bench_mark
          ./bin/flua
