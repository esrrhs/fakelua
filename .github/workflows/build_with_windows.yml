name: BuildWithWindows

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-lua
            mingw-w64-x86_64-ninja

      - name: Configure
        shell: msys2 {0}
        run: |
          set -eux
          rm -rf build
          cmake -S . -B build -G Ninja -DFAKELUA_TINYCC_GIT_URL=https://github.com/TinyCC/tinycc.git

      - name: Build
        shell: msys2 {0}
        run: |
          set -eux
          cmake --build build --parallel

      - name: Test
        shell: msys2 {0}
        run: |
          set -eux
          ctest --test-dir build -V

      - name: Run benchmarks and flua
        shell: msys2 {0}
        run: |
          set -eux
          cd build/bin
          ./bench_mark.exe
          ./flua.exe
