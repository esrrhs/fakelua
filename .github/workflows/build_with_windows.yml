name: BuildWithWindows

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    env:
      MSYSTEM: UCRT64
      CHERE_INVOKING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Update MSYS2 core
        run: C:\msys64\usr\bin\pacman -Syuu --noconfirm
        shell: cmd

      - name: Install MSYS2 packages
        run: C:\msys64\usr\bin\pacman -S --noconfirm --needed git make mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-lua mingw-w64-ucrt-x86_64-ninja
        shell: cmd

      - name: Configure
        shell: 'C:\msys64\usr\bin\bash.exe -l {0}'
        run: |
          set -eux
          rm -rf build
          cmake -S . -B build -G Ninja -DFAKELUA_TINYCC_GIT_URL=https://github.com/TinyCC/tinycc.git

      - name: Build
        shell: 'C:\msys64\usr\bin\bash.exe -l {0}'
        run: |
          set -eux
          cmake --build build --parallel

      - name: Test
        shell: 'C:\msys64\usr\bin\bash.exe -l {0}'
        run: |
          set -eux
          ctest --test-dir build -V

      - name: Run benchmarks and flua
        shell: 'C:\msys64\usr\bin\bash.exe -l {0}'
        run: |
          set -eux
          cd build/bin
          ./bench_mark.exe
          ./flua.exe
